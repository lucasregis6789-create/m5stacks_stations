<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset='utf-8'>
    <title>Dashboard IoT Distant</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f5; color: #333; margin: 0; padding: 10px; }
        .container { max-width: 1100px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
        h1 { color: #0055ff; text-align:center; } 
        h2 { color: #0055ff; margin-top: 0; display:flex; align-items:center; }
        .ok { color: #2ecc71; font-weight: bold; } 
        .err { color: #e74c3c; font-weight: bold; }
        .warning { color: #f39c12; font-weight: bold; }
        
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; vertical-align: middle; margin-right: 10px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #0055ff; } 
        input:checked + .slider:before { transform: translateX(20px); }
        
        .station-body { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 15px; border-top: 1px solid #ddd; padding-top: 15px; }
        .col { flex: 1; min-width: 280px; }
        .header-panel { display:flex; justify-content:center; align-items:center; margin-bottom:20px; }
        .header-box { background:white; padding:15px 25px; border-radius:8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display:flex; gap:20px; align-items:center; font-size:16px; }
        
        .btn-row { display: flex; gap: 10px; margin-top: 15px; }
        .btn-action { color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size:12px; flex: 1; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-action:hover { opacity: 0.8; transform: scale(0.98); }
        .btn-start { background: #3498db; }
        .btn-stop { background: #e67e22; }
        .btn-clear { background: #e74c3c; }
        .btn-dl { background: #2ecc71; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>Console SERVEUR IoT <span style="color: #e74c3c; font-size: 0.6em;">(ACCÈS DISTANT)</span></h1>

    <div class="header-panel">
        <div class="header-box">
            <div><b>Serveur MQTT : </b><span id='mqtt_status' class="warning">Connexion en cours...</span></div>
            <div style="border-left:2px solid #eee; height:30px;"></div>
            <div><b>Dernière maj : </b><span id='sys_time'>--</span></div>
        </div>
    </div>

    <div class='container' id='main_container'></div>

    <script>
        let state = {
            1: { active: true, alive: false, lastSeen: 0, lastRecorded: 0, temp: '--', hum: '--', c30: '--', c40: '--', no2: '--', co: '--', voc: '--', alc: '--', lm32: '--' },
            2: { active: true, alive: false, lastSeen: 0, lastRecorded: 0, temp: '--', hum: '--', c30: '--', c40: '--', no2: '--', co: '--', voc: '--', alc: '--', lm32: '--' },
            3: { active: true, alive: false, lastSeen: 0, lastRecorded: 0, temp: '--', hum: '--', c30: '--', c40: '--', no2: '--', co: '--', voc: '--', alc: '--', lm32: '--' }
        };

        // État de l'enregistrement pour chaque station
        let webLogState = {
            1: false,
            2: false,
            3: false
        };

        let historiqueCSV = {
            1: [],
            2: [],
            3: []
        };

        const maxDataPoints = 60; // Limite pour la fluidité du graphique (60 points sur le canevas)
        let charts = {};

        function buildUI() {
            let html = '';
            for (let i = 1; i <= 3; i++) {
                html += `
                <div class="card">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <h2 style="margin:0;">Station ${i} <span id="st${i}_status" style="font-size:14px; font-weight:normal; margin-left:15px;">- En attente de données...</span></h2>
                        <div style="display:flex; align-items:center;">
                            <b style="margin-right:10px;">Afficher</b>
                            <label class="switch"><input type="checkbox" checked onchange="toggleStation(${i}, this.checked)"><span class="slider"></span></label>
                        </div>
                    </div>

                    <div id="st${i}_content" class="station-body">
                        <div class="col" style="background:#e8f4f8; padding:15px; border-radius:8px; min-height:80px;">
                            <h3 style="margin-top:0;">Données en direct</h3>
                            <div id="st${i}_data">--</div>
                            
                            <div style="width:100%; height:200px; background:white; padding:10px; border-radius:8px; border:1px solid #ddd; margin-top:15px;">
                                <canvas id="chart_st${i}"></canvas>
                            </div>
                            
                            <!-- Panneau de contrôle du CSV -->
                            <div class="btn-row">
                                <button id="btn_weblog_${i}" class="btn-action btn-start" onclick="toggleWebLog(${i})">Démarrer stockage</button>
                                <button class="btn-action btn-clear" onclick="clearWebLog(${i})">Vider</button>
                            </div>
                            <button class="btn-action btn-dl" onclick="exportCSV(${i})">Télécharger l'historique complet</button>
                            <div style="text-align:center; font-size:11px; color:#777; margin-top:5px;" id="st${i}_compteur">0 points en mémoire</div>
                        </div>
                    </div>
                </div>`;
            }
            document.getElementById("main_container").innerHTML = html;
            initCharts();
        }

        function initCharts() {
            for(let i=1; i<=3; i++) {
                let ctx = document.getElementById('chart_st'+i).getContext('2d');
                charts[i] = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: [], 
                        datasets: [
                            { label: 'Temp SHT3X (°C)', borderColor: '#e74c3c', data: [], tension: 0.3, pointRadius: 2 },
                            { label: 'Temp LM32 (°C)', borderColor: '#3498db', data: [], tension: 0.3, pointRadius: 2 }
                        ]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false, animation: false, 
                        scales: { y: { suggestedMin: 15, suggestedMax: 35 } } 
                    }
                });
            }
        }

        // Mettre en pause ou reprendre l'enregistrement web
        function toggleWebLog(id) {
            webLogState[id] = !webLogState[id];
            let btn = document.getElementById('btn_weblog_' + id);
            if (webLogState[id]) {
                btn.innerHTML = 'Arrêter stockage';
                btn.className = 'btn-action btn-stop';
            } else {
                btn.innerHTML = 'Démarrer stockage';
                btn.className = 'btn-action btn-start';
            }
        }

        // Vider la mémoire RAM de la station
        function clearWebLog(id) {
            if (confirm(`Voulez-vous vraiment vider la mémoire Web de la Station ${id} ?`)) {
                historiqueCSV[id] = [];
                document.getElementById('st'+id+'_compteur').innerText = "0 points en mémoire";
            }
        }

        function exportCSV(id) {
            if (historiqueCSV[id].length === 0) {
                alert("Aucune donnée à télécharger pour l'instant.");
                return;
            }
            let csvContent = "Heure;SHT3X_Temp;SHT3X_Hum;SCD30_CO2;SCD40_CO2;NO2;CO;VOC;ALC;LM32_Temp\n";
            historiqueCSV[id].forEach(row => {
                csvContent += `${row.time};${row.t};${row.h};${row.c30};${row.c40};${row.no2};${row.co};${row.voc};${row.alc};${row.lm}\n`;
            });
            let blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            let url = URL.createObjectURL(blob);
            let link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", `Historique_Web_Station_${id}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function toggleStation(id, isVisible) {
            state[id].active = isVisible;
            document.getElementById('st' + id + '_content').style.display = isVisible ? 'flex' : 'none';
        }

        function updateUI() {
            let now = new Date();
            let timeStr = now.toLocaleTimeString('fr-FR');
            document.getElementById('sys_time').innerText = timeStr;

            let currentMillis = Date.now();

            for (let i = 1; i <= 3; i++) {
                let st = state[i];
                if (st.alive && (currentMillis - st.lastSeen > 10000)) {
                    st.alive = false;
                }

                // GESTION DU STOCKAGE EN ARRIÈRE-PLAN
                if (st.alive && st.lastSeen !== st.lastRecorded) {
                    // On ne stocke que si le bouton de stockage est sur ACTIF
                    if (webLogState[i]) {
                        historiqueCSV[i].push({
                            time: timeStr,
                            t: st.temp !== '--' ? st.temp : "",
                            h: st.hum !== '--' ? st.hum : "",
                            c30: st.c30 !== '--' ? st.c30 : "",
                            c40: st.c40 !== '--' ? st.c40 : "",
                            no2: st.no2 !== '--' ? st.no2 : "",
                            co: st.co !== '--' ? st.co : "",
                            voc: st.voc !== '--' ? st.voc : "",
                            alc: st.alc !== '--' ? st.alc : "",
                            lm: st.lm32 !== '--' ? st.lm32 : ""
                        });
                    }
                    st.lastRecorded = st.lastSeen; // On marque la donnée comme traitée
                    
                    if(st.active) {
                        document.getElementById('st'+i+'_compteur').innerText = historiqueCSV[i].length + " points en mémoire";
                    }
                }

                // AFFICHAGE DU GRAPHIQUE
                if (charts[i] && st.alive) {
                    charts[i].data.labels.push(timeStr);
                    let tSht = st.temp !== '--' ? parseFloat(st.temp) : null;
                    let tLm = st.lm32 !== '--' ? parseFloat(st.lm32) : null;
                    
                    charts[i].data.datasets[0].data.push(tSht);
                    charts[i].data.datasets[1].data.push(tLm);

                    if (charts[i].data.labels.length > maxDataPoints) {
                        charts[i].data.labels.shift();
                        charts[i].data.datasets[0].data.shift();
                        charts[i].data.datasets[1].data.shift();
                    }
                    charts[i].update();
                }

                if (!st.active) continue;

                let isAliveHtml = st.alive ? "<span class='ok'>Connectée (En direct)</span>" : "<span class='err'>Hors Ligne (Signal perdu)</span>";
                document.getElementById('st' + i + '_status').innerHTML = "- WiFi: " + isAliveHtml;

                let dataHTML = "";
                if (st.temp !== '--') dataHTML += `<p><b>SHT3X</b> : ${st.temp}°C | ${st.hum}%</p>`;
                if (st.c30 !== '--') dataHTML += `<p><b>SCD30</b> : ${parseFloat(st.c30).toFixed(0)} ppm</p>`;
                if (st.c40 !== '--') dataHTML += `<p><b>SCD40</b> : ${st.c40} ppm</p>`;
                if (st.no2 !== '--') dataHTML += `<p><b>GAS</b> : NO2:${st.no2} CO:${st.co} VOC:${st.voc}</p>`;
                if (st.lm32 !== '--') dataHTML += `<p><b>LM32</b> : ${st.lm32}°C</p>`;

                if (dataHTML === "") dataHTML = "<i>En attente des premiers capteurs...</i>";
                document.getElementById('st' + i + '_data').innerHTML = dataHTML;
            }
        }

        const clientId = 'web_dashboard_' + Math.random().toString(16).substr(2, 8);
        const host = 'wss://test.mosquitto.org:8081/mqtt';

        const options = { keepalive: 60, clientId: clientId, protocolId: 'MQTT', protocolVersion: 4, clean: true, reconnectPeriod: 1000, connectTimeout: 30 * 1000 };
        const client = mqtt.connect(host, options);

        client.on('connect', function () {
            let statusBadge = document.getElementById('mqtt_status');
            statusBadge.innerText = "Connecté";
            statusBadge.className = "ok";
            client.subscribe('mon_projet_etudiant/#');
        });

        client.on('error', function (error) {
            let statusBadge = document.getElementById('mqtt_status');
            statusBadge.innerText = "Erreur Serveur";
            statusBadge.className = "err";
        });

        client.on('offline', function () {
            let statusBadge = document.getElementById('mqtt_status');
            statusBadge.innerText = "Déconnecté";
            statusBadge.className = "err";
        });

        client.on('message', function (topic, message) {
            let topicParts = topic.split('/');
            if (topicParts.length === 3 && topicParts[0] === 'mon_projet_etudiant') {
                let stationId = parseInt(topicParts[1].replace('station', ''));
                let sensorName = topicParts[2];
                let value = message.toString();

                if (stationId >= 1 && stationId <= 3) {
                    state[stationId].alive = true;
                    state[stationId].lastSeen = Date.now();

                    if (sensorName === 'temp') state[stationId].temp = value;
                    else if (sensorName === 'hum') state[stationId].hum = value;
                    else if (sensorName === 'co2_scd30') state[stationId].c30 = value;
                    else if (sensorName === 'co2_scd40') state[stationId].c40 = value;
                    else if (sensorName === 'no2') state[stationId].no2 = value;
                    else if (sensorName === 'co') state[stationId].co = value;
                    else if (sensorName === 'voc') state[stationId].voc = value;
                    else if (sensorName === 'alc') state[stationId].alc = value;
                    else if (sensorName === 'lm32') state[stationId].lm32 = value;
                }
            }
        });

        buildUI();
        setInterval(updateUI, 1000);
    </script>
</body>
</html>
